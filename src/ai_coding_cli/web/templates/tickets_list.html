{% extends "base.html" %}
{% block content %}
  <h1 class="text-2xl font-semibold mb-6">Tickets</h1>
  {% if sessions %}
    <ul class="space-y-2">
      {% for s in sessions %}
        <li class="bg-white rounded-lg shadow-sm px-4 py-3">
          <a class="font-mono text-blue-700 hover:underline" href="/tickets/{{ s.jira_key }}">
            {{ s.jira_key }}
          </a>
          <span class="ml-2 text-xs text-slate-500">{{ s.mode }} · {{ s.status }}</span>
        </li>
      {% endfor %}
    </ul>
  {% else %}
    <p class="text-slate-500">No tickets in flight yet.</p>
  {% endif %}
{% endblock %}
